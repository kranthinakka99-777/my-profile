<!DOCTYPE html>
<html>
<head>
    <title>Kranthi | Portfolio</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #00f2fe;
        }

        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #00f2fe;
        }

        /* Hero Section */
        .hero {
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-direction: column;
        }

        .hero h1 {
            font-size: 45px;
        }

        .hero span {
            color: #00f2fe;
        }

        .typing {
            margin-top: 10px;
            font-size: 18px;
            border-right: 2px solid white;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 4s steps(30) forwards, blink 0.7s infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 280px }
        }

        @keyframes blink {
            50% { border-color: transparent }
        }

        /* Buttons */
        .buttons {
            margin-top: 30px;
        }

        .btn {
            padding: 12px 25px;
            margin: 10px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .login-btn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
        }

        .social-btn {
            background: #1e293b;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px #00f2fe;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            background: #020617;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">Kranthi.dev</div>
    <div class="nav-links">
        <a href="login.html">Login</a>
    </div>
</div>

<!-- Hero Section -->
<div class="hero">
    <h1>Hi, I'm <span>Kranthi</span> 🚀</h1>

    <div class="typing">
        AIML Student | Future AI Engineer 🤖
    </div>

    <div class="buttons">
        <a href="login.html" class="btn login-btn">
            <i class="fas fa-sign-in-alt"></i> Enter Dashboard
        </a>

        <a href="https://www.instagram.com/kranthi777_king/" target="_blank" class="btn social-btn">
            <i class="fab fa-instagram"></i>
        </a>

        <a href="https://in.linkedin.com/in/nakka-kranthi-69008737a" target="_blank" class="btn social-btn">
            <i class="fab fa-linkedin"></i>
        </a>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    © 2026 Kranthi | Built with ❤️
</div>

</body>
</html>
