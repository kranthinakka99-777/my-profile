<!DOCTYPE html>
<html>
<head>
    <title>Kranthi Website</title>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(270deg, #00c6ff, #0072ff, #6a11cb);
            background-size: 600% 600%;
            animation: bgMove 10s ease infinite;
            color: white;
        }

        @keyframes bgMove {
            0% { background-position: 0% }
            50% { background-position: 100% }
            100% { background-position: 0% }
        }

        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            color: #ddd;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            margin: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .login-btn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
        }

        .login-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px #00f2fe;
        }

        .insta-btn {
            background: linear-gradient(45deg, #f09433, #dc2743);
        }

        .insta-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px #ff4b92;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Hi, I'm Kranthi 🚀</h1>
    <p>AIML Student | Future AI Engineer 🤖</p>

    <!-- Login Button -->
    <a href="login.html" class="btn login-btn">
        <i class="fas fa-sign-in-alt"></i> Login
    </a>

    <!-- Instagram -->
    <a href="https://www.instagram.com/kranthi777_king/" target="_blank" class="btn insta-btn">
        <i class="fab fa-instagram"></i> Instagram
    </a>
</div>

</body>
</html>
