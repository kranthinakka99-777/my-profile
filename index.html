<!DOCTYPE html>
<html>
<head>
    <title>Kranthi Website</title>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(270deg, #00c6ff, #0072ff, #6a11cb);
            background-size: 600% 600%;
            animation: bgMove 10s ease infinite;
            color: white;
        }

        @keyframes bgMove {
            0% { background-position: 0% }
            50% { background-position: 100% }
            100% { background-position: 0% }
        }

        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 60px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 40px;
        }

        /* Typing animation */
        .typing {
            font-size: 18px;
            border-right: 2px solid white;
            width: 0;
            overflow: hidden;
            white-space: nowrap;
            animation: typing 4s steps(30) infinite, blink 0.7s infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 260px }
        }

        @keyframes blink {
            50% { border-color: transparent }
        }

        /* Button */
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #00f2fe;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Hi, I'm Kranthi 🚀</h1>

    <div class="typing">
        AIML Student | Future AI Engineer 🤖
    </div>

    <a href="login.html" class="btn">
        <i class="fas fa-sign-in-alt"></i> Enter Website
    </a>
</div>

</body>
</html>
